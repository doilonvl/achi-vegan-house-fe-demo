name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: https://api.achiveganhouse.com/api/v1
      NEXT_PUBLIC_APP_URL: https://www.achiveganhouse.com
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: drdox7h0l
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
